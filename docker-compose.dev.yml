name: frj-cms-dev

x-logging: &default_logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:16-alpine}
    init: true
    restart: unless-stopped
    env_file:
      - .env.development
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-frjcms}
      POSTGRES_USER: ${POSTGRES_USER:-strapi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-strapi}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_BIND_ADDR:-127.0.0.1}:${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-strapi} -d ${POSTGRES_DB:-frjcms}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    logging: *default_logging
    networks:
      frj_network:
        aliases:
          - postgres
          - db

  strapi:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
      args:
        NODE_IMAGE: ${NODE_IMAGE:-node:20-alpine}
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmmirror.com}
    init: true
    restart: unless-stopped
    env_file:
      - .env.development
    environment:
      NODE_ENV: development
      HOST: 0.0.0.0
      PORT: 1337
      DATABASE_CLIENT: postgres
      DATABASE_HOST: ${DATABASE_HOST:-postgres}
      DATABASE_PORT: ${DATABASE_PORT:-5432}
      DATABASE_NAME: ${DATABASE_NAME:-frjcms}
      DATABASE_USERNAME: ${DATABASE_USERNAME:-strapi}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-strapi}
      DATABASE_SSL: ${DATABASE_SSL:-false}
      APP_KEYS: ${APP_KEYS}
      API_TOKEN_SALT: ${API_TOKEN_SALT}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET}
      TRANSFER_TOKEN_SALT: ${TRANSFER_TOKEN_SALT}
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      STRAPI_ADMIN_EMAIL: ${STRAPI_ADMIN_EMAIL:-admin@example.com}
      STRAPI_ADMIN_PASSWORD: ${STRAPI_ADMIN_PASSWORD:-Admin123456!}
      PUBLIC_URL: ${STRAPI_PUBLIC_URL:-http://localhost:${STRAPI_PORT:-1337}}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - strapi_node_modules:/app/node_modules
      - strapi_cache:/app/.cache
      - strapi_build:/app/build
      - strapi_uploads:/app/public/uploads
    ports:
      - "${STRAPI_BIND_ADDR:-127.0.0.1}:${STRAPI_PORT:-1337}:1337"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:1337/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 45s
    command: sh -c "npm install && npm run develop"
    logging: *default_logging
    networks:
      - frj_network

  nextjs:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
      args:
        NODE_IMAGE: ${NODE_IMAGE:-node:20-alpine}
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmmirror.com}
    init: true
    restart: unless-stopped
    env_file:
      - .env.development
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:1337}
      STRAPI_URL: ${STRAPI_URL:-http://strapi:1337}
      APP_URL: ${APP_URL:-http://localhost:3000}
    depends_on:
      strapi:
        condition: service_healthy
    volumes:
      - ./frontend:/app
      - next_node_modules:/app/node_modules
      - next_cache:/app/.next
    ports:
      - "${NEXT_BIND_ADDR:-127.0.0.1}:${NEXT_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    command: sh -c "npm install && npm run dev -- --hostname 0.0.0.0 --port 3000"
    logging: *default_logging
    networks:
      - frj_network

volumes:
  postgres_data:
  strapi_node_modules:
  strapi_cache:
  strapi_build:
  strapi_uploads:
  next_node_modules:
  next_cache:

networks:
  frj_network:
